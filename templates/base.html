<style>

    }
    html,body{
	margin:0;

}/* Header */
.large-header {
	position: relative;
	width: 100%;
	overflow-y: auto;

	background-position: center center;
	z-index: 1;
}
#demo-canvas {
    position: fixed;
    z-index: -1;
}

.errorlist {
    color: red;
    list-style: none;
}

</style>

<body>

    {% block content %}

    

    {% endblock %}

    <canvas id="demo-canvas"></canvas>
    </div>
<script src='https://www.marcoguglie.it/Codepen/AnimatedHeaderBg/demo-1/js/EasePack.min.js'></script>
